<!DOCTYPE html>
<html>
<head>
  <title>Pi App</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>

<body>

  <h2>🚀 Pi App</h2>

  <!-- BUTTONS ZIGOMBA KUGARAGARA -->
  <button onclick="testBackend()">Test Server</button>
  <button onclick="loginWithPi()">Login with Pi</button>
  <button onclick="payWithPi()">Pay with Pi</button>

  <script>
    const API_URL = "https://pi-server-3pra.onrender.com";

    // INIT PI
    Pi.init({ version: "2.0" });

    // TEST SERVER
    async function testBackend() {
      try {
        const res = await fetch(API_URL + "/");
        const data = await res.text();
        alert(data);
      } catch (err) {
        alert("Server error");
      }
    }

    // LOGIN
    async function loginWithPi() {
      try {
        const auth = await Pi.authenticate(["username", "payments"]);
        alert("Welcome " + auth.user.username);
      } catch (err) {
        alert("Login failed");
      }
    }

    // PAYMENT
    async function payWithPi() {
      try {
        await Pi.createPayment({
          amount: 1,
          memo: "Test payment",
          metadata: { productId: "item001" }
        }, {

          onReadyForServerApproval: async (paymentId) => {
            await fetch(API_URL + "/approve", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ paymentId })
            });
          },

          onReadyForServerCompletion: async (paymentId, txid) => {
            await fetch(API_URL + "/complete", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ paymentId, txid })
            });
          },

          onCancel: () => {
            alert("Payment canceled");
          },

          onError: (error) => {
            alert("Payment error");
          }
        });

      } catch (err) {
        alert("Fatal error");
      }
    }
  </script>

</body>
</html>
