<!DOCTYPE html>
<html>
<head>
  <title>Socker App</title>
</head>
<body>

<h2>Pi Payment Test</h2>

<button onclick="pay()">Pay with Pi</button>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<script>
Pi.init({ version: "2.0", sandbox: true });

Pi.authenticate([], function(auth) {
  console.log("Auth:", auth);
}, function(error) {
  console.error("Auth error:", error);
});

function pay() {
  Pi.createPayment({
    amount: 1,
    memo: "Test payment",
    metadata: { itemId: "123" }
  }, {
    onReadyForServerApproval: function(paymentId) {
      fetch("https://pi-server-3pra.onrender.com/approve", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ paymentId })
      });
    },
    onReadyForServerCompletion: function(paymentId, txid) {
      fetch("https://pi-server-3pra.onrender.com/complete", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ paymentId, txid })
      });
    },
    onCancel: function() {
      console.log("Cancelled");
    },
    onError: function(error) {
      console.error("Payment error:", error);
    }
  });
}
</script>

</body>
</html>
