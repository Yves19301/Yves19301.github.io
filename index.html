<!DOCTYPE html>
<html>
<head>
  <title>Pi Payment Test</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>

<body>

<h2>Pi Payment Test</h2>

<button onclick="login()">Login with Pi</button>
<br><br>
<button onclick="pay()">Pay with Pi</button>

<script>
  Pi.init({ version: "2.0" });

  const backendURL = "https://pi-server-3pra.onrender.com";

  let currentUser = null;

  // 🔐 LOGIN FIRST
  function login() {
    Pi.authenticate(["payments"], function(user) {
      console.log("User:", user);
      currentUser = user;
      alert("Logged in!");
    });
  }

  // 💰 PAYMENT
  function pay() {
    if (!currentUser) {
      alert("Please login first");
      return;
    }

    Pi.createPayment({
      amount: 1,
      memo: "Test Payment",
      metadata: { type: "test" }
    }, {
      onReadyForServerApproval: function(paymentId) {
        fetch(`${backendURL}/approve`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ paymentId })
        });
      },

      onReadyForServerCompletion: function(paymentId, txid) {
        fetch(`${backendURL}/complete`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ paymentId, txid })
        });
      },

      onCancel: function() {
        console.log("Cancelled");
      },

      onError: function(error) {
        console.error("Error:", error);
      }
    });
  }
</script>

</body>
</html>
