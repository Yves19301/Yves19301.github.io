<!DOCTYPE html>
<html>
<head>
  <title>Pi Payment Test</title>
</head>

<body>
  <h2>Pi Payment Test</h2>

  <button onclick="login()">Login with Pi</button>
  <br><br>
  <button onclick="pay()">Pay with Pi</button>

  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <script>
    let currentUser = null;

    // Kurindira SDK ibe loaded neza
    document.addEventListener("DOMContentLoaded", () => {
      if (window.Pi) {
        Pi.init({ version: "2.0", sandbox: true });
      } else {
        alert("Pi SDK ntabwo yikoreye neza");
      }
    });

    async function login() {
      try {
        const scopes = ['username', 'payments'];
        const auth = await Pi.authenticate(scopes);
        currentUser = auth.user;

        alert("Login success: " + currentUser.username);
      } catch (err) {
        console.error(err);
      }
    }

    async function pay() {
      if (!currentUser) {
        alert("Banza ukore Login");
        return;
      }

      try {
        await Pi.createPayment({
          amount: 1,
          memo: "Test payment",
          metadata: {
            item: "test",
            user: currentUser.username
          }
        }, {
          onReadyForServerApproval: async (paymentId) => {
            await fetch("https://pi-server-3pra.onrender.com/approve", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ paymentId })
            });
          },
          onReadyForServerCompletion: async (paymentId, txid) => {
            await fetch("https://pi-server-3pra.onrender.com/complete", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ paymentId, txid })
            });
          }
        });

      } catch (e) {
        console.error(e);
      }
    }
  </script>
</body>
</html>
