<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pi App Frontend</title>

  <!-- Pi SDK -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h2>🚀 Pi App Dashboard</h2>

  <!-- 🔗 Backend URL -->
  <script>
    const API_URL = "https://pi-server-3pra.onrender.com";
  </script>

  <!-- 🧪 TEST BACKEND -->
  <button onclick="testBackend()">Test Server</button>

  <!-- 🔐 LOGIN WITH PI -->
  <button onclick="loginWithPi()">Login with Pi</button>

  <!-- 💰 PAYMENT TEST -->
  <button onclick="payWithPi()">Pay with Pi</button>

  <script>
    // Initialize Pi SDK
    Pi.init({ version: "2.0" });

    // 🧪 Test backend connection
    async function testBackend() {
      try {
        const res = await fetch(API_URL + "/");
        const data = await res.text();
        alert(data);
      } catch (err) {
        alert("Server error");
      }
    }

    // 🔐 Login with Pi
    async function loginWithPi() {
      try {
        const scopes = ['username', 'payments'];

        const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);

        console.log("User:", auth.user);
        alert("Welcome " + auth.user.username);

      } catch (err) {
        alert("Login failed");
      }
    }

    // 💰 Pay with Pi (demo payment)
    async function payWithPi() {
      try {
        const payment = await Pi.createPayment({
          amount: 1,
          memo: "Test payment",
          metadata: { app: "Pi App" }
        }, {
          onReadyForServerApproval: async (paymentId) => {
            await fetch(API_URL + "/approve", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ paymentId })
            });
          },

          onReadyForServerCompletion: async (paymentId, txid) => {
            await fetch(API_URL + "/complete", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ paymentId, txid })
            });
          },

          onCancel: () => {
            alert("Payment cancelled");
          },

          onError: (error) => {
            console.log(error);
            alert("Payment error");
          }
        });

      } catch (err) {
        alert("Payment failed");
      }
    }

    function onIncompletePaymentFound(payment) {
      console.log("Incomplete payment:", payment);
    }
  </script>

</body>
</html>
