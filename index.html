<!DOCTYPE html>
<html>
<head>
  <title>Pi App</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>

<body>

  <h2>🚀 Pi App</h2>

  <button onclick="testBackend()">Test Server</button>
  <br><br>

  <button onclick="loginWithPi()">Login with Pi</button>
  <br><br>

  <button onclick="payWithPi()">Pay with Pi</button>

  <script>
    const API_URL = "https://pi-server-3pra.onrender.com";

    // INIT PI SDK
    Pi.init({ version: "2.0" });

    // TEST BACKEND
    async function testBackend() {
      try {
        const res = await fetch(API_URL + "/");
        const data = await res.text();
        alert(data);
      } catch (err) {
        alert("Server error");
      }
    }

    // LOGIN
    async function loginWithPi() {
      try {
        const scopes = ['username', 'payments'];
        const auth = await Pi.authenticate(scopes);

        alert("Welcome " + auth.user.username);
      } catch (err) {
        alert("Login failed");
      }
    }

    // PAYMENT
    async function payWithPi() {
      try {
        await Pi.createPayment({
          amount: 1,
          memo: "Test payment",
          metadata: {
            productId: "item001"
          }
        }, {

          // APPROVE
          onReadyForServerApproval: async (paymentId) => {
            const res = await fetch(API_URL + "/approve", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ paymentId })
            });

            const data = await res.json();
            alert("APPROVE: " + JSON.stringify(data));
          },

          // COMPLETE
          onReadyForServerCompletion: async (paymentId, txid) => {
            const res = await fetch(API_URL + "/complete", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ paymentId, txid })
            });

            const data = await res.json();
            alert("COMPLETE: " + JSON.stringify(data));
          },

          onCancel: () => {
            alert("❌ Payment canceled");
          },

          onError: (error) => {
            alert("🔥 Error: " + JSON.stringify(error));
          }
        });

      } catch (err) {
        alert("Fatal error");
      }
    }
  </script>

</body>
</html>
