<!DOCTYPE html>
<html>
<head>
  <title>Pi Payment Test</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>

<body>
  <h2>Pi Payment Test</h2>

  <button onclick="login()">Login with Pi</button>
  <br><br>
  <button onclick="pay()">Pay with Pi</button>

  <script>
    Pi.init({ version: "2.0", sandbox: true });

    const backendURL = "https://pi-server-3pra.onrender.com";
    let currentUser = null;

    // LOGIN
    async function login() {
      try {
        const scopes = ['username', 'payments'];
        const auth = await Pi.authenticate(scopes);
        currentUser = auth.user;
        alert("Login success: " + currentUser.username);
      } catch (err) {
        console.error("Login error:", err);
      }
    }

    // PAYMENT
    async function pay() {
      if (!currentUser) {
        alert("Banza ukore Login with Pi");
        return;
      }

      try {
        await Pi.createPayment({
          amount: 1,
          memo: "Test payment",
          metadata: { item: "test" }
        }, {
          onReadyForServerApproval: async function(paymentId) {
            const res = await fetch(backendURL + "/approve-payment", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ paymentId })
            });

            if (!res.ok) alert("Approval failed ❌");
          },

          onReadyForServerCompletion: async function(paymentId, txid) {
            const res = await fetch(backendURL + "/complete-payment", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ paymentId, txid })
            });

            if (!res.ok) alert("Completion failed ❌");
          },

          onCancel: function() {
            alert("Payment cancelled");
          },

          onError: function(err) {
            console.error(err);
          }
        });

      } catch (e) {
        console.error(e);
      }
    }
  </script>
</body>
</html>
