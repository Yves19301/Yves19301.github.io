<!DOCTYPE html>
<html>
<head>
  <title>Pi App</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>

<body>

  <h2>🚀 Pi App</h2>

  <button onclick="testBackend()">Test Server</button>
  <br><br>

  <button onclick="loginWithPi()">Login with Pi</button>
  <br><br>

  <button onclick="payWithPi()">Pay with Pi</button>

  <script>
    const API_URL = "https://pi-server-3pra.onrender.com";

    // 🔗 INIT PI SDK
    Pi.init({ version: "2.0" });

    // 🧪 TEST BACKEND
    async function testBackend() {
      try {
        const res = await fetch(API_URL + "/");
        const data = await res.text();
        alert(data);
      } catch (err) {
        alert("Server error");
      }
    }

    // 🔐 LOGIN WITH PI
    async function loginWithPi() {
      try {
        const scopes = ['username', 'payments'];

        const auth = await Pi.authenticate(scopes);

        console.log("User:", auth.user);
        alert("Welcome " + auth.user.username);

      } catch (err) {
        console.log(err);
        alert("Login failed");
      }
    }

    // 💰 PAY WITH PI (FIXED METADATA)
    async function payWithPi() {
      try {
        const payment = await Pi.createPayment({
          amount: 1,
          memo: "Test payment",
          metadata: {
            productId: "item001",
            note: "test-payment"
          } // ✔ ntabwo ari empty
        }, {
          onReadyForServerApproval: async (paymentId) => {
            console.log("Approving:", paymentId);

            const res = await fetch(API_URL + "/approve", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ paymentId })
            });

            const data = await res.json();
            console.log("Approve response:", data);
          },

          onReadyForServerCompletion: async (paymentId, txid) => {
            console.log("Completing:", paymentId, txid);

            const res = await fetch(API_URL + "/complete", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ paymentId, txid })
            });

            const data = await res.json();
            console.log("Complete response:", data);
          },

          onCancel: () => {
            console.log("❌ Payment canceled");
            alert("Payment canceled");
          },

          onError: (error) => {
            console.log("🔥 Payment error:", error);
            alert("Payment error");
          }
        });

      } catch (err) {
        console.log("Fatal error:", err);
      }
    }
  </script>

</body>
</html>
