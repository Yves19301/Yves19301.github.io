<!DOCTYPE html>
<html>
<head>
  <title>Pi App Store</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>

<body>

  <h2>🚀 Pi App Store</h2>

  <button onclick="loginWithPi()">Login with Pi</button>

  <br><br>

  <button onclick="buyItem()">Buy Premium Item - 1 Pi</button>

  <br><br>

  <div id="premiumContent" style="display:none;">
    <h3>🎉 Premium Item Unlocked</h3>
    <p>You successfully purchased this content.</p>
  </div>

  <script>
    const API_URL = "https://pi-server-3pra.onrender.com";

    // INIT PI
    Pi.init({ version: "2.0" });

    // AUTO RESTORE PURCHASE
    window.onload = () => {
      const purchased = localStorage.getItem("premium");

      if (purchased === "true") {
        document.getElementById("premiumContent").style.display = "block";
      }
    };

    // LOGIN
    async function loginWithPi() {
      try {
        const auth = await Pi.authenticate(["username", "payments"]);

        alert("Welcome " + auth.user.username);

      } catch (err) {
        alert("Login failed");
      }
    }

    // BUY ITEM
    async function buyItem() {

      try {

        await Pi.createPayment({
          amount: 1,
          memo: "Premium Item",
          metadata: {
            productId: "premium001"
          }
        }, {

          // APPROVE
          onReadyForServerApproval: async (paymentId) => {

            await fetch(API_URL + "/approve", {
              method: "POST",
              headers: {
                "Content-Type": "application/json"
              },
              body: JSON.stringify({ paymentId })
            });
          },

          // COMPLETE
          onReadyForServerCompletion: async (paymentId, txid) => {

            await fetch(API_URL + "/complete", {
              method: "POST",
              headers: {
                "Content-Type": "application/json"
              },
              body: JSON.stringify({ paymentId, txid })
            });

            // SAVE PURCHASE
            localStorage.setItem("premium", "true");

            // UNLOCK ITEM
            document.getElementById("premiumContent").style.display = "block";

            alert("🎉 Purchase successful!");
          },

          onCancel: () => {
            alert("Payment canceled");
          },

          onError: (error) => {
            console.log(error);
            alert("Payment error");
          }

        });

      } catch (err) {
        console.log(err);
        alert("Fatal error");
      }
    }
  </script>

</body>
</html>
