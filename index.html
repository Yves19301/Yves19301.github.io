<!DOCTYPE html>
<html>
<head>
  <title>Socker App</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ================= CSS START ================= -->
  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#050816;
      font-family:Arial;
      color:white;
      padding-bottom:90px;
    }

    /* TOP BAR */
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:18px;
      background:#0b1020;
      border-bottom:1px solid #1b2238;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .shield{
      width:42px;
      height:42px;
      border-radius:14px;
      background:#18d26e;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:20px;
      color:black;
      font-weight:bold;
    }

    .title{
      font-size:28px;
      font-weight:bold;
    }

    /* NOTIFICATION */
    .notification{
      width:44px;
      height:44px;
      border-radius:50%;
      background:#11192d;
      display:flex;
      justify-content:center;
      align-items:center;
      position:relative;
      cursor:pointer;
      font-size:20px;
    }

    .dot{
      position:absolute;
      top:8px;
      right:10px;
      width:10px;
      height:10px;
      border-radius:50%;
      background:#18d26e;
    }

    /* LEAGUES */
    .leagues{
      display:flex;
      overflow-x:auto;
      gap:12px;
      padding:18px;
      scrollbar-width:none;
    }

    .leagues::-webkit-scrollbar{
      display:none;
    }

    .league{
      min-width:150px;
      background:#141c31;
      color:white;
      padding:14px;
      border-radius:18px;
      text-align:center;
      cursor:pointer;
      font-weight:bold;
      transition:0.2s;
    }

    .activeLeague{
      background:#18d26e;
      color:black;
    }

    /* LIVE HEADER */
    .live-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:0 18px;
      margin-bottom:15px;
    }

    .live-title{
      font-size:24px;
      font-weight:bold;
    }

    .live-badge{
      background:#ff3b5c;
      padding:10px 15px;
      border-radius:20px;
      font-weight:bold;
    }

    /* MATCH CARD */
    .match-card{
      background:#11192d;
      margin:18px;
      border-radius:24px;
      padding:22px;
      border:1px solid #1f2942;
    }

    .league-name{
      color:#9aa3bb;
      margin-bottom:12px;
    }

    .minute{
      color:#ff4a6a;
      text-align:right;
      font-weight:bold;
      margin-bottom:10px;
    }

    .match-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .team{
      width:35%;
      font-size:18px;
      font-weight:bold;
    }
