<!DOCTYPE html>
<html>
<head>
  <title>Socker App</title>

  <style>

    body {<!-- 🏠 HOME START -->
<div id="home" style="display:block; font-family:Arial; background:#0f0f0f; color:white; min-height:100vh;">

  <!-- 🔴 TOP BAR -->
  <div style="display:flex;justify-content:space-between;align-items:center;padding:12px;background:black;">
    <div>⚽ Socker App</div>
    <div style="color:red;font-weight:bold;">🔴 Live (3)</div>
  </div>

  <!-- 🟢 LEAGUES SCROLLER -->
  <div style="display:flex;overflow-x:auto;gap:10px;padding:10px;background:#111;">

    <div class="league" onclick="openLeague(this,'premier')"
      style="min-width:140px;padding:10px;background:green;border-radius:10px;text-align:center;cursor:pointer;">
      Premier League
    </div>

    <div class="league" onclick="openLeague(this,'laliga')"
      style="min-width:140px;padding:10px;background:#222;border-radius:10px;text-align:center;cursor:pointer;">
      LaLiga
    </div>

    <div class="league" onclick="openLeague(this,'bundesliga')"
      style="min-width:140px;padding:10px;background:#222;border-radius:10px;text-align:center;cursor:pointer;">
      Bundesliga
    </div>

    <div class="league" onclick="openLeague(this,'seriea')"
      style="min-width:140px;padding:10px;background:#222;border-radius:10px;text-align:center;cursor:pointer;">
      Serie A
    </div>

  </div>

  <!-- 📦 CONTENT -->
  <div id="content" style="padding:15px;">

    <h3>🏆 Welcome Home</h3>
    <p>Select a league to see matches</p>

  </div>

</div>
<!-- 🏠 HOME END -->
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
    }

    /* TOP LIVE BAR */
    .live-bar {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      background: black;
      color: white;
    }

    .live {
      color: red;
      font-weight: bold;
    }

    /* LEAGUE SCROLLER */
    .leagues {
      display: flex;
      overflow-x: auto;
      padding: 10px;
      gap: 15px;
    }

    .league {
      min-width: 120px;
      padding: 10px;
      background: #222;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
    }

    /* TABS */
    .tabs {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      background: #111;
      padding: 10px 0;
    }

    .tab {
      color: white;
      text-align: center;
      font-size: 12px;
      cursor: pointer;
    }

    .active {
      color: gold;
    }

    /* BACK BUTTON */
    .back {
      position: absolute;
      top: 10px;
      left: 10px;
      background: #222;
      padding: 5px 10px;
      border-radius: 8px;
      cursor: pointer;
    }

  </style>
</head>

<body>

<!-- BACK -->
<div class="back" onclick="goHome()">⬅ Back</div>

<!-- LIVE BAR -->
<div class="live-bar">
  <div>⚽ Socker App</div>
  <div class="live">🔴 Live (3)</div>
</div>

<!-- HOME -->
<div id="home">

  <!-- LEAGUES -->
  <div class="leagues">
    <div class="league" onclick="openLeague('premier')">Premier League</div>
    <div class="league" onclick="openLeague('laliga')">LaLiga</div>
    <div class="league" onclick="openLeague('bundesliga')">Bundesliga</div>
    <div class="league" onclick="openLeague('seriea')">Serie A</div>
  </div>

  <div id="content">
    <h3>🔥 Select a league</h3>
  </div>

</div>

<!-- OTHER TABS -->
<div id="fixtures" style="display:none;">Fixtures Page</div>
<div id="store" style="display:none;">Store Page</div>
<div id="discover" style="display:none;">Discover Page</div>
<div id="profile" style="display:none;">Profile Page</div>
<div id="club" style="display:none;">Club Page</div>

<!-- TABS NAV -->
<div class="tabs">

  <div class="tab" onclick="openTab('home')">Home</div>
  <div class="tab" onclick="openTab('fixtures')">Fixtures</div>
  <div class="tab" onclick="openTab('store')">Store</div>
  <div class="tab" onclick="openTab('discover')">Discover</div>
  <div class="tab" onclick="openTab('profile')">Profile</div>
  <div class="tab" onclick="openTab('club')">Club</div>

</div>

<script>

function openTab(tab) {

  const pages = ["home","fixtures","store","discover","profile","club"];

  pages.forEach(p => {
    document.getElementById(p).style.display = "none";
  });

  document.getElementById(tab).style.display = "block";
}

function goHome() {
  openTab("home");
}

function openLeague(league) {

  const content = document.getElementById("content");

  if (league === "premier") {
    content.innerHTML = "🏆 Premier League Matches";
  }

  if (league === "laliga") {
    content.innerHTML = "⚽ LaLiga Matches";
  }

  if (league === "bundesliga") {
    content.innerHTML = "🔥 Bundesliga Matches";
  }

  if (league === "seriea") {
    content.innerHTML = "🇮🇹 Serie A Matches";
  }
}

</script>

</body>
</html>
