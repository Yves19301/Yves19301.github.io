<!DOCTYPE html>
<html>
<head>
  <title>Socker App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
    }

    /* TOP BAR */
    .live-bar {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      background: black;
      align-items: center;
    }

    /* LEAGUES */
    .leagues {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      padding: 10px;
      background: #111;
    }

    .league {
      min-width: 130px;
      padding: 10px;
      background: #222;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
    }

    /* ACTIVE GREEN */
    .active {
      background: green !important;
    }

    /* CONTENT */
    #content {
      padding: 15px;
    }

    /* TABS */
    .tabs {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      background: #111;
      padding: 10px 0;
    }

    .tab {
      font-size: 12px;
      cursor: pointer;
      color: white;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<!-- 🔴 TOP BAR -->
<div class="live-bar">
  <div>⚽ Socker App</div>
  <div style="color:red;">🔴 Live (3)</div>
</div>

<!-- 🏠 HOME -->
<div id="home">

  <!-- LEAGUES -->
  <div class="leagues">

    <div class="league active" onclick="openLeague(this,'premier')">Premier League</div>
    <div class="league" onclick="openLeague(this,'laliga')">LaLiga</div>
    <div class="league" onclick="openLeague(this,'bundesliga')">Bundesliga</div>
    <div class="league" onclick="openLeague(this,'seriea')">Serie A</div>

  </div>

  <!-- CONTENT -->
  <div id="content">
    <h3>🏆 Welcome Home</h3>
    <p>Select a league</p>
  </div>

</div>

<!-- 📄 OTHER TABS -->
<div id="fixtures" class="hidden">Fixtures Page</div>
<div id="store" class="hidden">Store Page</div>
<div id="discover" class="hidden">Discover Page</div>
<div id="profile" class="hidden">Profile Page</div>
<div id="club" class="hidden">Club Page</div>

<!-- 🔵 TABS -->
<div class="tabs">
  <div class="tab" onclick="openTab('home')">Home</div>
  <div class="tab" onclick="openTab('fixtures')">Fixtures</div>
  <div class="tab" onclick="openTab('store')">Store</div>
  <div class="tab" onclick="openTab('discover')">Discover</div>
  <div class="tab" onclick="openTab('profile')">Profile</div>
  <div class="tab" onclick="openTab('club')">Club</div>
</div>

<script>

function openTab(tab) {

  const pages = ["home","fixtures","store","discover","profile","club"];

  pages.forEach(p => {
    document.getElementById(p).classList.add("hidden");
  });

  document.getElementById(tab).classList.remove("hidden");
}

/* 🔥 LEAGUE SYSTEM */
function openLeague(el, league) {

  // reset active
  document.querySelectorAll(".league").forEach(l => {
    l.classList.remove("active");
  });

  // set active
  el.classList.add("active");

  const content = document.getElementById("content");

  if (league === "premier") {
    content.innerHTML = `
      <h2>🏆 Premier League</h2>
      <p>⚽ Arsenal 2 - 1 Chelsea</p>
      <p>⚽ Man City 3 - 0 Liverpool</p>
      <p>⚽ Spurs 1 - 1 Man United</p>
    `;
  }

  if (league === "laliga") {
    content.innerHTML = `
      <h2>🇪🇸 LaLiga</h2>
      <p>⚽ Real Madrid 2 - 0 Barca</p>
      <p>⚽ Atletico 1 - 1 Sevilla</p>
    `;
  }

  if (league === "bundesliga") {
    content.innerHTML = `
      <h2>🇩🇪 Bundesliga</h2>
      <p>⚽ Bayern 3 - 1 Dortmund</p>
    `;
  }

  if (league === "seriea") {
    content.innerHTML = `
      <h2>🇮🇹 Serie A</h2>
      <p>⚽ Inter 2 - 0 Milan</p>
    `;
  }
}

</script>

</body>
</html>
