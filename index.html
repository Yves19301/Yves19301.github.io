<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Socker Pro</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0b0f19;color:white}
header{padding:15px;text-align:center;background:#111827;color:#38bdf8;font-size:20px}

.container{padding:15px}

.tab{display:none}
.active{display:block}

/* leagues scroll */
.leagues{
display:flex;
overflow-x:auto;
gap:10px;
margin-bottom:10px;
}
.league{
min-width:140px;
background:#1f2937;
padding:10px;
border-radius:10px;
text-align:center;
cursor:pointer;
}

/* cards */
.card{
background:#161b22;
padding:15px;
margin-top:10px;
border-radius:12px;
}

/* nav */
.nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:#111827;
padding:10px;
}
.nav button{
background:#38bdf8;
border:none;
padding:10px;
border-radius:8px;
}

/* back */
.back{
background:#ef4444;
margin-bottom:10px;
}

/* button */
button{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:10px;
background:#38bdf8;
}
</style>
</head>

<body>

<header>⚽ Socker Pro</header>

<div class="container">

<!-- HOME -->
<div id="home" class="tab active">

<div class="leagues">
<div class="league" onclick="league('PL')">Premier League</div>
<div class="league" onclick="league('LL')">La Liga</div>
