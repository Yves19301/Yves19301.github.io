<!DOCTYPE html>
<html>
<head>
  <title>Pi Payment Test</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>

<h1>Pi Payment Test</h1>

<button onclick="pay()">Pay with Pi</button>

<script>
Pi.init({ version: "2.0", sandbox: true });

let user;

async function login() {
  try {
    user = await Pi.authenticate([]);
    console.log("User:", user);
  } catch (err) {
    console.error("Auth error:", err);
  }
}

login();

function pay() {
  if (!user) {
    alert("User not authenticated yet");
    return;
  }

  Pi.createPayment({
    amount: 1,
    memo: "Test payment",
    metadata: { itemId: "123" }
  }, {
    onReadyForServerApproval: function(paymentId) {
      fetch("https://pi-server-3pra.onrender.com/approve", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ paymentId })
      });
    },
    onReadyForServerCompletion: function(paymentId, txid) {
      fetch("https://pi-server-3pra.onrender.com/complete", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ paymentId, txid })
      });
    },
    onCancel: function() {
      console.log("Cancelled");
    },
    onError: function(error) {
      console.error("Payment error:", error);
    }
  });
}
</script>

</body>
</html>
