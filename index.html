<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Socker Pro</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#050816;
color:white;
padding-bottom:90px;
}

/* TOPBAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px;
background:#0b1020;
border-bottom:1px solid #1d2640;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.shield{
width:45px;
height:45px;
border-radius:14px;
background:#19d36b;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
color:black;
font-weight:bold;
}

.title{
font-size:28px;
font-weight:bold;
}

.notification{
width:45px;
height:45px;
border-radius:50%;
background:#11192d;
display:flex;
justify-content:center;
align-items:center;
position:relative;
cursor:pointer;
font-size:20px;
}

.dot{
position:absolute;
top:8px;
right:10px;
width:10px;
height:10px;
border-radius:50%;
background:#19d36b;
}

/* LEAGUES */
.leagues{
display:flex;
overflow-x:auto;
gap:12px;
padding:18px;
}

.leagues::-webkit-scrollbar{
display:none;
}

.league{
min-width:150px;
background:#141c31;
padding:14px;
border-radius:18px;
text-align:center;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

.activeLeague{
background:#19d36b;
color:black;
}

/* LIVE HEADER */
.live-header{
display:flex;
justify-content:space-between;
padding:0 18px;
margin-bottom:18px;
}

.live-title{
font-size:25px;
font-weight:bold;
}

.live-badge{
background:#ff3b5c;
padding:10px 15px;
border-radius:20px;
font-weight:bold;
}

/* MATCH */
.match-card{
background:#11192d;
margin:18px;
border-radius:25px;
padding:22px;
border:1px solid #1d2640;
}

.league-name{
color:#9ca3af;
margin-bottom:10px;
}

.minute{
color:#ff4d6d;
font-weight:bold;
margin-bottom:10px;
text-align:right;
}

.match-row{
display:flex;
justify-content:space-between;
align-items:center;
}

.team{
width:35%;
font-size:20px;
font-weight:bold;
}

.score{
width:20%;
text-align:center;
font-size:50px;
font-weight:bold;
}

.stadium{
margin-top:18px;
padding-top:14px;
border-top:1px solid #1d2640;
display:flex;
justify-content:space-between;
color:#9ca3af;
}

.details{
color:#19d36b;
font-weight:bold;
cursor:pointer;
}

/* NAV */
.tabs{
position:fixed;
bottom:0;
width:100%;
background:#0b1020;
display:flex;
justify-content:space-around;
padding:14px 0;
border-top:1px solid #1d2640;
}

.tab{
text-align:center;
font-size:13px;
color:#9ca3af;
cursor:pointer;
}

.activeTab{
color:#19d36b;
font-weight:bold;
}

</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">

<div class="logo">
<div class="shield">⚽</div>
<div class="title">SOCKER</div>
</div>

<div class="notification" onclick="showNotifications()">
🔔
<div class="dot"></div>
</div>

</div>

<!-- LEAGUES -->
<div class="leagues">

<div class="league activeLeague" onclick="changeLeague('Premier League')">
Premier League
</div>

<div class="league" onclick="changeLeague('LaLiga')">
LaLiga
</div>

<div class="league" onclick="changeLeague('Bundesliga')">
Bundesliga
</div>

<div class="league" onclick="changeLeague('Serie A')">
Serie A
</div>

<div class="league" onclick="changeLeague('Ligue 1')">
Ligue 1
</div>

</div>

<!-- HEADER -->
<div class="live-header">
<div class="live-title">🔴 LIVE NOW</div>
<div class="live-badge" id="liveCount">3 LIVE</div>
</div>

<!-- MATCH -->
<div class="match-card">

<div class="league-name" id="leagueName">
Premier League
</div>

<div class="minute" id="minute">
78'
</div>

<div class="match-row">

<div class="team" id="team1">
Manchester City
</div>

<div class="score" id="score">
2 : 1
</div>

<div class="team" id="team2" style="text-align:right;">
Liverpool
</div>

</div>

<div class="stadium">
<div id="stadium">
📍 Etihad Stadium
</div>

<div class="details" onclick="showDetails()">
Details >
</div>
</div>

</div>

<!-- NAV -->
<div class="tabs">

<div class="tab activeTab" onclick="changeTab(this)">
🟢<br>HOME
</div>

<div class="tab" onclick="changeTab(this)">
📅<br>FIXTURES
</div>

<div class="tab" onclick="changeTab(this)">
🛡️<br>CLUB
</div>

<div class="tab" onclick="changeTab(this)">
🛒<br>STORE
</div>

<div class="tab" onclick="changeTab(this)">
👤<br>PROFILE
</div>

</div>

<script>

/* LEAGUE SWITCH */
function changeLeague(name){

document.querySelectorAll(".league").forEach(l=>{
l.classList.remove("activeLeague");
});

event.target.classList.add("activeLeague");

if(name==="Premier League"){
updateMatch(
"Premier League",
"Manchester City",
"Liverpool",
"2 : 1",
"78'",
"📍 Etihad Stadium"
);
}

if(name==="LaLiga"){
updateMatch(
"LaLiga",
"Barcelona",
"Real Madrid",
"1 : 1",
"45+2'",
"📍 Camp Nou"
);
}

if(name==="Bundesliga"){
updateMatch(
"Bundesliga",
"Bayern Munich",
"Dortmund",
"3 : 0",
"FT",
"📍 Allianz Arena"
);
}

if(name==="Serie A"){
updateMatch(
"Serie A",
"Inter Milan",
"Juventus",
"2 : 2",
"66'",
"📍 San Siro"
);
}

if(name==="Ligue 1"){
updateMatch(
"Ligue 1",
"PSG",
"Marseille",
"4 : 1",
"90'",
"📍 Parc des Princes"
);
}

}

/* UPDATE MATCH */
function updateMatch(league,t1,t2,score,minute,stadium){

document.getElementById("leagueName").innerText=league;
document.getElementById("team1").innerText=t1;
document.getElementById("team2").innerText=t2;
document.getElementById("score").innerText=score;
document.getElementById("minute").innerText=minute;
document.getElementById("stadium").innerText=stadium;

}

/* DETAILS */
function showDetails(){

alert(
"Full match statistics:\n\nPossession: 61%\nShots: 15\nCorners: 7"
);

}

/* NOTIFICATIONS */
function showNotifications(){

alert(
"🔔 New predictions available!\n\n🔥 VIP Tips Updated"
);

}

/* TABS */
function changeTab(tab){

document.querySelectorAll(".tab").forEach(t=>{
t.classList.remove("activeTab");
});

tab.classList.add("activeTab");

alert(tab.innerText + " page coming soon");

}

</script>

</body>
</html>
