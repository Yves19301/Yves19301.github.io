<!DOCTYPE html>
<html>
<head>
  <title>Pi Payment Test</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>

<body>
  <h2>Pi Payment Test</h2>

  <button onclick="login()">Login with Pi</button>
  <br><br>
  <button onclick="pay()">Pay with Pi</button>

  <script>
    // Pi Init
    Pi.init({ version: "2.0", sandbox: false });

    let currentUser = null;
    const backendURL = "https://pi-server-3pra.onrender.com";

    // LOGIN
    async function login() {
      try {
        const scopes = ["username", "payments"];
        const auth = await Pi.authenticate(scopes);

        currentUser = auth.user;

        alert("Login success: " + currentUser.username);

      } catch (err) {
        console.error("Login error:", err);
        alert("Login failed");
      }
    }

    // PAYMENT
    async function pay() {
      if (!currentUser) {
        alert("Banza ukore Login with Pi");
        return;
      }

      try {
        await Pi.createPayment(
          {
            amount: 1,
            memo: "Test payment",
            metadata: {
              item: "test"
            }
          },
          {
            onReadyForServerApproval: async function(paymentId) {
              alert("Approval started");

              const res = await fetch(
                backendURL + "/approve-payment",
                {
                  method: "POST",
                  headers: {
                    "Content-Type": "application/json"
                  },
                  body: JSON.stringify({ paymentId })
                }
              );

              alert("Approval status: " + res.status);
            },

            onReadyForServerCompletion: async function(paymentId, txid) {
              const res = await fetch(
                backendURL + "/complete-payment",
                {
                  method: "POST",
                  headers: {
                    "Content-Type": "application/json"
                  },
                  body: JSON.stringify({
                    paymentId,
                    txid
                  })
                }
              );

              alert("Completion status: " + res.status);
            },

            onCancel: function() {
              alert("Cancelled");
            },

            onError: function(error) {
              console.error("Payment error:", error);
              alert("Payment error");
            }
          }
        );

      } catch (e) {
        console.error("Create payment error:", e);
        alert("Create payment failed");
      }
    }
  </script>
</body>
</html>
