<!DOCTYPE html>
<html>
<head>
  <title>Pi Payment Test</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>

<body>
  <h2>Pi Payment Test</h2>

  <button onclick="login()">Login with Pi</button>
  <br><br>
  <button onclick="pay()">Pay with Pi</button>

  <script>
    Pi.init({ version: "2.0", sandbox: false });

    let currentUser = null;

    async function login() {
      try {
        const scopes = ['username', 'payments'];
        const auth = await Pi.authenticate(scopes);
        currentUser = auth.user;
        alert("Login success: " + currentUser.username);
      } catch (err) {
        console.error("Login error:", err);
      }
    }

    async function pay() {
      if (!currentUser) {
        alert("Banza ukore Login with Pi");
        return;
      }

      try {
        await Pi.createPayment({
          amount: 1,
          memo: "Test payment",
          metadata: { item: "test" }
        }, {
          onReadyForServerApproval: async (paymentId) => {
            await fetch("https://pi-server-3pra.onrender.com/approve-payment", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ paymentId })
            });
          },

          onReadyForServerCompletion: async (paymentId, txid) => {
            await fetch("https://pi-server-3pra.onrender.com/complete-payment", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ paymentId, txid })
            });
          },

          onCancel: () => alert("Cancelled"),
          onError: (err) => console.error(err)
        });

      } catch (e) {
        console.error(e);
      }
    }
  </script>
</body>
</html>
